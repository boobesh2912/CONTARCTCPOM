                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-md">
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-gray-600">Total Tests</span>
                                <FileTextIcon className="w-5 h-5 text-blue-600" />
                            </div>
                            <div className="text-3xl font-bold text-gray-900">{testHistory.length}</div>
                            <div className="text-sm text-gray-500 mt-1">All time</div>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-md">
                            <div className="flex items-center justify-between mb-2">
                                <span className="text-gray-600">Avg Confidence</span>
                                <CheckCircleIcon className="w-5 h-5 text-purple-600" />
                            </div>
                            <div className="text-3xl font-bold text-gray-900">
                                {Math.round(testHistory.reduce((acc, t) => acc + t.confidence, 0) / testHistory.length)}%
                            </div>
                            <div className="text-sm text-gray-500 mt-1">Analysis accuracy</div>
                        </div>
                    </div>

                    {/* Trend Graph */}
                    <div className="bg-white p-6 rounded-xl shadow-md mb-8">
                        <h2 className="text-xl font-semibold mb-6 text-gray-900">Risk Score Trend</h2>
                        <div className="flex items-end space-x-4 h-64">
                            {chartData.map((test, idx) => (
                                <div key={test.id} className="flex-1 flex flex-col items-center">
                                    <div className="w-full bg-gray-200 rounded-t-lg relative" style={{ height: '100%' }}>
                                        <div
                                            className="absolute bottom-0 w-full bg-gradient-to-t from-green-500 to-green-400 rounded-t-lg transition-all"
                                            style={{ height: `${test.riskScore * 2}%` }}
                                        ></div>
                                    </div>
                                    <div className="text-sm text-gray-600 mt-2">{new Date(test.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</div>
                                    <div className="text-xs font-semibold text-gray-900">{test.riskScore}%</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Recent Tests */}
                    <div className="bg-white p-6 rounded-xl shadow-md">
                        <h2 className="text-xl font-semibold mb-6 text-gray-900">Recent Tests</h2>
                        <div className="space-y-4">
                            {testHistory.map((test) => (
                                <div key={test.id} className="flex items-center justify-between p-4 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors">
                                    <div className="flex items-center space-x-4">
                                        <div className={`w-12 h-12 rounded-full flex items-center justify-center ${
                                            test.riskScore < 30 ? 'bg-green-100 text-green-600' :
                                            test.riskScore < 60 ? 'bg-yellow-100 text-yellow-600' :
                                            'bg-red-100 text-red-600'
                                        }`}>
                                            <ActivityIcon className="w-6 h-6" />
                                        </div>
                                        <div>
                                            <div className="font-semibold text-gray-900">
                                                {new Date(test.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}
                                            </div>
                                            <div className="text-sm text-gray-600">Confidence: {test.confidence}%</div>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <div className="text-2xl font-bold text-gray-900">{test.riskScore}%</div>
                                        <div className={`text-sm font-semibold ${
                                            test.riskScore < 30 ? 'text-green-600' :
                                            test.riskScore < 60 ? 'text-yellow-600' :
                                            'text-red-600'
                                        }`}>
                                            {test.riskScore < 30 ? 'Low Risk' : test.riskScore < 60 ? 'Medium Risk' : 'High Risk'}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // Test Recording Component
        const VoiceTest = ({ onComplete }) => {
            const [isRecording, setIsRecording] = useState(false);
            const [recordingTime, setRecordingTime] = useState(0);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [result, setResult] = useState(null);
            const timerRef = useRef(null);

            const startRecording = () => {
                setIsRecording(true);
                setRecordingTime(0);
                timerRef.current = setInterval(() => {
                    setRecordingTime(prev => {
                        if (prev >= 30) {
                            stopRecording();
                            return 30;
                        }
                        return prev + 1;
                    });
                }, 1000);
            };

            const stopRecording = () => {
                setIsRecording(false);
                if (timerRef.current) {
                    clearInterval(timerRef.current);
                }
                analyzeRecording();
            };

            const analyzeRecording = () => {
                setIsAnalyzing(true);
                // Simulate API call
                setTimeout(() => {
                    const mockResult = {
                        riskScore: Math.floor(Math.random() * 30) + 10, // 10-40% for demo
                        confidence: Math.floor(Math.random() * 10) + 85, // 85-95%
                        status: 'low',
                        recommendations: [
                            'Your voice patterns show normal characteristics',
                            'Continue monitoring with regular tests',
                            'Maintain a healthy lifestyle and stay active'
                        ]
                    };
                    setResult(mockResult);
                    setIsAnalyzing(false);
                }, 2000);
            };

            const handleNewTest = () => {
                setResult(null);
                setRecordingTime(0);
            };

            if (result) {
                return (
                    <div className="p-6 max-w-4xl mx-auto">
                        <div className="bg-white p-8 rounded-xl shadow-lg">
                            <div className="text-center mb-8">
                                <div className={`w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-4 ${
                                    result.riskScore < 30 ? 'bg-green-100' :
                                    result.riskScore < 60 ? 'bg-yellow-100' :
                                    'bg-red-100'
                                }`}>
                                    <div className={`text-4xl font-bold ${
                                        result.riskScore < 30 ? 'text-green-600' :
                                        result.riskScore < 60 ? 'text-yellow-600' :
                                        'text-red-600'
                                    }`}>
                                        {result.riskScore}%
                                    </div>
                                </div>
                                <h2 className="text-3xl font-bold mb-2 text-gray-900">Test Complete</h2>
                                <p className={`text-xl font-semibold ${
                                    result.riskScore < 30 ? 'text-green-600' :
                                    result.riskScore < 60 ? 'text-yellow-600' :
                                    'text-red-600'
                                }`}>
                                    {result.riskScore < 30 ? 'Low Risk Detected' :
                                     result.riskScore < 60 ? 'Medium Risk Detected' :
                                     'Higher Risk Detected'}
                                </p>
                            </div>

                            {/* Waveform Visualization */}
                            <div className="mb-8 p-6 bg-gray-50 rounded-lg">
                                <h3 className="text-sm font-semibold text-gray-600 mb-4">Voice Pattern Analysis</h3>
                                <div className="flex items-center justify-center space-x-1 h-24">
                                    {[...Array(50)].map((_, i) => (
                                        <div
                                            key={i}
                                            className="w-1 bg-blue-500 rounded-full"
                                            style={{
                                                height: `${Math.random() * 80 + 20}%`,
                                                opacity: 0.3 + Math.random() * 0.7
                                            }}
                                        ></div>
                                    ))}
                                </div>
                            </div>

                            {/* Confidence Score */}
                            <div className="mb-8 p-6 bg-blue-50 rounded-lg">
                                <div className="flex items-center justify-between mb-2">
                                    <span className="font-semibold text-gray-900">Analysis Confidence</span>
                                    <span className="text-2xl font-bold text-blue-600">{result.confidence}%</span>
                                </div>
                                <div className="w-full bg-blue-200 rounded-full h-3">
                                    <div
                                        className="bg-blue-600 h-3 rounded-full transition-all"
                                        style={{ width: `${result.confidence}%` }}
                                    ></div>
                                </div>
                            </div>

                            {/* Recommendations */}
                            <div className="mb-8">
                                <h3 className="text-lg font-semibold mb-4 text-gray-900">Recommendations</h3>
                                <ul className="space-y-3">
                                    {result.recommendations.map((rec, idx) => (
                                        <li key={idx} className="flex items-start">
                                            <CheckCircleIcon className="w-6 h-6 text-green-600 mr-3 flex-shrink-0 mt-0.5" />
                                            <span className="text-gray-700">{rec}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>

                            {result.riskScore >= 30 && (
                                <div className="mb-8 p-4 bg-yellow-50 border-l-4 border-yellow-400 rounded">
                                    <div className="flex items-start">
                                        <AlertCircleIcon className="w-6 h-6 text-yellow-600 mr-3 flex-shrink-0" />
                                        <div>
                                            <h4 className="font-semibold text-yellow-900 mb-1">Medical Consultation Recommended</h4>
                                            <p className="text-yellow-800 text-sm">
                                                Please consult with a healthcare professional for a comprehensive evaluation.
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            <div className="flex gap-4">
                                <button
                                    onClick={handleNewTest}
                                    className="flex-1 px-6 py-3 border-2 border-blue-600 text-blue-600 rounded-lg hover:bg-blue-50 transition-colors font-semibold"
                                >
                                    Take Another Test
                                </button>
                                <button
                                    onClick={() => onComplete(result)}
                                    className="flex-1 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-semibold"
                                >
                                    Save to Dashboard
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (isAnalyzing) {
                return (
                    <div className="p-6 max-w-2xl mx-auto">
                        <div className="bg-white p-12 rounded-xl shadow-lg text-center">
                            <div className="w-24 h-24 border-8 border-blue-200 border-t-blue-600 rounded-full animate-spin mx-auto mb-6"></div>
                            <h2 className="text-2xl font-bold mb-2 text-gray-900">Analyzing Your Voice...</h2>
                            <p className="text-gray-600">Our AI is processing your voice patterns</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-6 max-w-2xl mx-auto">
                    <div className="bg-white p-8 rounded-xl shadow-lg">
                        <h2 className="text-2xl font-bold mb-6 text-center text-gray-900">Voice Recording Test</h2>
                        <p className="text-gray-600 text-center mb-8">
                            Speak naturally for 30 seconds. You can say anything - count numbers, describe your day, or read a passage.
                        </p>

                        <div className="text-center mb-8">
                            <div className={`w-40 h-40 rounded-full flex items-center justify-center mx-auto mb-6 ${
                                isRecording ? 'bg-red-100' : 'bg-blue-100'
                            }`}>
                                <MicIcon className={`w-20 h-20 ${
                                    isRecording ? 'text-red-600 recording-pulse' : 'text-blue-600'
                                }`} />
                            </div>
                            <div className="text-5xl font-bold text-gray-900 mb-2">{recordingTime}s</div>
                            <div className="text-gray-600">
                                {isRecording ? 'Recording in progress...' : 'Ready to record'}
                            </div>
                        </div>

                        {isRecording && (
                            <div className="mb-8">
                                <div className="w-full bg-gray-200 rounded-full h-2">
                                    <div
                                        className="bg-blue-600 h-2 rounded-full transition-all"
                                        style={{ width: `${(recordingTime / 30) * 100}%` }}
                                    ></div>
                                </div>
                            </div>
                        )}

                        <div className="flex gap-4">
                            {!isRecording ? (
                                <button
                                    onClick={startRecording}
                                    className="flex-1 px-8 py-4 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-semibold text-lg"
                                >
                                    Start Recording
                                </button>
                            ) : (
                                <button
                                    onClick={stopRecording}
                                    className="flex-1 px-8 py-4 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors font-semibold text-lg"
                                >
                                    Stop Recording
                                </button>
                            )}
                        </div>

                        <div className="mt-8 p-4 bg-blue-50 rounded-lg">
                            <h3 className="font-semibold text-gray-900 mb-2">Tips for best results:</h3>
                            <ul className="text-sm text-gray-700 space-y-1">
                                <li>• Find a quiet environment</li>
                                <li>• Speak at your normal pace and volume</li>
                                <li>• Hold your device about 6 inches from your mouth</li>
                                <li>• Complete the full 30 seconds for accurate analysis</li>
                            </ul>
                        </div>
                    </div>
                </div>
            );
        };

        // Profile Component
        const Profile = ({ onExportHistory }) => {
            const [userData] = useState({
                name: 'John Doe',
                email: 'john.doe@example.com',
                memberSince: '2025-12-15',
                plan: 'Pro',
                emergencyContact: {
                    name: 'Jane Doe',
                    phone: '+1 (555) 123-4567',
                    relation: 'Spouse'
                }
            });

            return (
                <div className="p-6 max-w-4xl mx-auto">
                    <h1 className="text-3xl font-bold text-gray-900 mb-8">Profile Settings</h1>

                    {/* User Info */}
                    <div className="bg-white p-6 rounded-xl shadow-md mb-6">
                        <h2 className="text-xl font-semibold mb-6 text-gray-900">Personal Information</h2>
                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                                <input
                                    type="text"
                                    value={userData.name}
                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                    readOnly
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                <input
                                    type="email"
                                    value={userData.email}
                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                    readOnly
                                />
                            </div>
                            <div className="grid md:grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Member Since</label>
                                    <input
                                        type="text"
                                        value={new Date(userData.memberSince).toLocaleDateString()}
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50"
                                        readOnly
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Current Plan</label>
                                    <input
                                        type="text"
                                        value={userData.plan}
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50"
                                        readOnly
                                    />
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Emergency Contact */}
                    <div className="bg-white p-6 rounded-xl shadow-md mb-6">
                        <h2 className="text-xl font-semibold mb-6 text-gray-900">Emergency Contact</h2>
                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Contact Name</label>
                                <input
                                    type="text"
                                    value={userData.emergencyContact.name}
                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                    readOnly
                                />
                            </div>
                            <div className="grid md:grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                                    <input
                                        type="tel"
                                        value={userData.emergencyContact.phone}
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                        readOnly
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Relationship</label>
                                    <input
                                        type="text"
                                        value={userData.emergencyContact.relation}
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                        readOnly
                                    />
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Export Data */}
                    <div className="bg-white p-6 rounded-xl shadow-md">
                        <h2 className="text-xl font-semibold mb-4 text-gray-900">Export Test History</h2>
                        <p className="text-gray-600 mb-6">
                            Download your complete test history as a PDF report to share with your healthcare provider.
                        </p>
                        <button
                            onClick={onExportHistory}
                            className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-semibold flex items-center space-x-2"
                        >
                            <DownloadIcon className="w-5 h-5" />
                            <span>Export as PDF</span>
                        </button>
                    </div>
                </div>
            );
        };

        // Main App Component
        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [currentView, setCurrentView] = useState('landing'); // landing, dashboard, test, profile
            const [testHistory, setTestHistory] = useState(MOCK_TEST_HISTORY);

            useEffect(() => {
                // Load from localStorage
                const savedAuth = localStorage.getItem('mediguardian_auth');
                const savedHistory = localStorage.getItem('mediguardian_history');

                if (savedAuth === 'true') {
                    setIsLoggedIn(true);
                    setCurrentView('dashboard');
                }

                if (savedHistory) {
                    setTestHistory(JSON.parse(savedHistory));
                }
            }, []);

            const handleLogin = () => {
                setIsLoggedIn(true);
                setCurrentView('dashboard');
                localStorage.setItem('mediguardian_auth', 'true');
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                setCurrentView('landing');
                localStorage.setItem('mediguardian_auth', 'false');
            };

            const handleTryDemo = () => {
                setCurrentView('test');
            };

            const handleNewTest = () => {
                setCurrentView('test');
            };

            const handleTestComplete = (result) => {
                const newTest = {
                    id: testHistory.length + 1,
                    date: new Date().toISOString().split('T')[0],
                    riskScore: result.riskScore,
                    confidence: result.confidence,
                    status: result.status
                };
                const updatedHistory = [newTest, ...testHistory];
                setTestHistory(updatedHistory);
                localStorage.setItem('mediguardian_history', JSON.stringify(updatedHistory));
                setCurrentView('dashboard');
            };

            const handleExportHistory = () => {
                alert('PDF export functionality would be implemented with a backend service. This would generate a comprehensive medical report with all test results, trends, and visualizations.');
            };

            const renderNavbar = () => {
                if (!isLoggedIn || currentView === 'landing') return null;

                return (
                    <nav className="bg-white shadow-sm sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                            <div className="flex justify-between items-center">
                                <div className="flex items-center space-x-8">
                                    <div className="flex items-center space-x-2 cursor-pointer" onClick={() => setCurrentView('dashboard')}>
                                        <ShieldCheckIcon className="w-8 h-8 text-blue-600" />
                                        <span className="text-2xl font-bold text-gray-900">MediGuardian</span>
                                    </div>
                                    <div className="hidden md:flex space-x-6">
                                        <button
                                            onClick={() => setCurrentView('dashboard')}
                                            className={`font-medium transition-colors ${
                                                currentView === 'dashboard' ? 'text-blue-600' : 'text-gray-600 hover:text-gray-900'
                                            }`}
                                        >
                                            Dashboard
                                        </button>
                                        <button
                                            onClick={handleNewTest}
                                            className={`font-medium transition-colors ${
                                                currentView === 'test' ? 'text-blue-600' : 'text-gray-600 hover:text-gray-900'
                                            }`}
                                        >
                                            New Test
                                        </button>
                                        <button
                                            onClick={() => setCurrentView('profile')}
                                            className={`font-medium transition-colors ${
                                                currentView === 'profile' ? 'text-blue-600' : 'text-gray-600 hover:text-gray-900'
                                            }`}
                                        >
                                            Profile
                                        </button>
                                    </div>
                                </div>
                                <button
                                    onClick={handleLogout}
                                    className="flex items-center space-x-2 px-4 py-2 text-gray-600 hover:text-gray-900 transition-colors"
                                >
                                    <LogOutIcon className="w-5 h-5" />
                                    <span className="font-medium">Logout</span>
                                </button>
                            </div>
                        </div>
                    </nav>
                );
            };

            const renderContent = () => {
                if (currentView === 'landing') {
                    return <LandingPage onLogin={handleLogin} onTryDemo={handleTryDemo} />;
                }

                if (currentView === 'dashboard') {
                    return <Dashboard onLogout={handleLogout} onNewTest={handleNewTest} testHistory={testHistory} />;
                }

                if (currentView === 'test') {
                    return <VoiceTest onComplete={handleTestComplete} />;
                }

                if (currentView === 'profile') {
                    return <Profile onExportHistory={handleExportHistory} />;
                }
            };

            return (
                <div className="min-h-screen bg-gray-50">
                    {renderNavbar()}
                    {renderContent()}
                </div>
            );
        };

        // Render the app
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
